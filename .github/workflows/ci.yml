name: CI/CD for FeroukArt Backend

on:
  push:
    branches:
      - master
      - prod

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Run Tests
        run: mvn test -Dspring.profiles.active=test

      - name: Start ssh-agent
        if: github.ref == 'refs/heads/prod'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BUSINESS_SERVER }}

      - name: Deploy to Hetzner (prod)
        if: github.ref == 'refs/heads/prod'
        run: |
          echo "🚀 Connecting to Hetzner (91.98.119.218) ..."
          ssh -o StrictHostKeyChecking=no root@91.98.119.218 "mkdir -p /opt/feroukart_back"

          echo "📦 Uploading application..."
          scp -o StrictHostKeyChecking=no target/*.jar root@91.98.119.218:/opt/feroukart_back/feroukart_back.jar

          echo "🔄 Restarting service..."
          ssh -o StrictHostKeyChecking=no root@91.98.119.218 << 'EOF'
            # Kill any rogue java process on the feroukArt backend port
            PID=$(lsof -ti:8081 || true)
            if [ -n "$PID" ]; then
              echo "⚠️ Killing leftover process on port 8081 (PID=$PID)..."
              kill -9 $PID
            fi
            # Restart systemd service
            systemctl daemon-reload
            systemctl restart feroukArt
            systemctl status feroukArt --no-pager -l
          EOF

          echo "✅ FeroukArt backend deployment finished successfully!"
